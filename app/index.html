  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>Ambiance Index</h1>
            <p>Références architecturales classées par ambiances</p>
            <p class="creator-line">
              Créatrice de l'outil : Michèle Atié, docteure en architecture
            </p>
          </div>
        </div>
        <div class="topbar-meta">
          <span id="dataset-count">Chargement...</span>
          <button class="ghost-button" id="reset-button" type="button">Réinitialiser</button>
        </div>
      </header>

      <main class="workspace">
        <section class="search-panel" id="search-panel" aria-labelledby="search-title">
          <div class="section-heading">
            <h2 id="search-title">
              <button
                class="search-toggle"
                id="search-toggle"
                type="button"
                aria-expanded="true"
                aria-controls="search-panel-content"
              >
                Recherche
              </button>
            </h2>
            <span id="active-filter-count">0 filtre</span>
          </div>

          <div id="search-panel-content" class="search-panel-content">
            <label class="search-field">
              <span>Mot, lieu, architecte ou ambiance</span>
              <input
                id="search-input"
                type="search"
                autocomplete="off"
                placeholder="ex. lumière diffuse, refuge, Zumthor..."
              />
            </label>

            <div class="quick-themes" aria-label="Thèmes rapides">
              <button type="button" data-preset="light">Lumière filtrée</button>
              <button type="button" data-preset="water">Eau et rituel</button>
              <button type="button" data-preset="sound">Son et rituel</button>
              <button type="button" data-preset="concept">Site et climat</button>
              <button type="button" data-preset="memory">Mémoire / absence</button>
              <button type="button" data-preset="refuge">Refuge et étude</button>
              <button type="button" data-preset="matter">Matière et corps</button>
            </div>

            <div class="filter-scroll" id="filters"></div>
          </div>
        </section>

        <section class="results-panel" aria-live="polite">
          <div class="results-toolbar">
            <div>
              <h2>Références</h2>
              <p id="results-summary">Chargement des références.</p>
            </div>
            <label class="sort-field">
              <span>Tri</span>
              <select id="sort-select">
                <option value="relevance">Pertinence</option>
                <option value="name">Nom</option>
                <option value="period">Période</option>
              </select>
            </label>
          </div>

          <div id="selected-tags" class="selected-tags" aria-label="Filtres actifs"></div>
          <div id="results-list" class="results-list"></div>
        </section>

        <aside class="detail-panel" aria-label="Fiche référence">
          <div id="detail-empty" class="detail-empty">
            <h2>Fiche référence</h2>
            <p>Sélectionne une référence pour afficher ses ambiances, sources et annotations.</p>
          </div>
          <article id="detail-card" class="detail-card" hidden></article>
        </aside>
      </main>
    </div>

    <script src="./src/main.ts" type="module"></script>
  </body>
</html>
